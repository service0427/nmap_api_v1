<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXTERNAL MONITORING VIEWER</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- AG Grid Community CSS & JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.2.1/styles/ag-grid.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.2.1/styles/ag-theme-quartz.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.2.1/dist/ag-grid-community.min.js"></script>
  
  <!-- Separated CSS Stylesheet -->
  <link rel="stylesheet" href="/style.css?v=20260619_1" />
  <!-- Separated Javascript Application -->
  <script src="/app.js?v=20260619_1" defer></script>
  <!-- Error Logger -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      fetch('/api/v1/log-error', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: message,
          source: source,
          lineno: lineno,
          colno: colno,
          stack: error ? error.stack : ''
        })
      });
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      fetch('/api/v1/log-error', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: 'Unhandled promise rejection: ' + event.reason,
          stack: event.reason ? event.reason.stack : ''
        })
      });
    });
  </script>
</head>
<body>

  <!-- Fixed Navigation Header -->
  <header>
    <div class="header-container">
      <div class="logo-area">
        <i data-lucide="shield-check" class="logo-icon"></i>
        <div class="logo-text" id="header-logo-title">EXTERNAL MONITOR</div>
      </div>
      <div class="header-meta">
        <div class="time-badge" id="kst-timer">
          <i data-lucide="clock" style="width: 14px; height: 14px;"></i>KST --:--:--
        </div>
        <div class="time-badge" id="update-countdown">10초 후 갱신</div>
        <button class="refresh-btn" onclick="fetchData()" title="즉시 새로고침" id="btn-refresh">
          <i data-lucide="refresh-cw" style="width: 16px; height: 16px;" id="refresh-icon"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Viewport Content -->
  <main>
    
    <!-- 1. Thin Horizontal Summary KPI Row -->
    <div class="stats-row">
      <!-- Total Target -->
      <div class="stat-item accent">
        <span class="stat-label">전체 작업량</span>
        <span class="stat-val" id="stats-target">0</span>
      </div>
      
      <!-- Success Completed -->
      <div class="stat-item success">
        <span class="stat-label">성공 작업량</span>
        <span class="stat-val" id="stats-success">0</span>
      </div>

      <!-- Remaining -->
      <div class="stat-item warning">
        <span class="stat-label">남은 작업량</span>
        <span class="stat-val" id="stats-remain">0</span>
      </div>
      
      <!-- Fail -->
      <div class="stat-item danger">
        <span class="stat-label">실패 작업량</span>
        <span class="stat-val" id="stats-fail">0</span>
      </div>

      <!-- Linear Progress & Percent -->
      <div class="stat-item progress-item success">
        <span class="stat-label" id="showcase-title">작업 진행도</span>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="stats-progress-fill" style="width: 0%"></div>
          </div>
          <span class="progress-text" id="stats-percent">0%</span>
        </div>
      </div>
    </div>

    <!-- 2. ag-Grid Panel (Read-only Viewer) -->
    <div class="panel">
      
      <!-- Category Tabs (사용중 / 완료됨 / 만료됨 / 전체) -->
      <div class="tabs-bar" id="status-tabs">
        <button class="tab-btn active" data-status="active">사용 중 (진행형)</button>
        <button class="tab-btn" data-status="completed">오늘 완료됨</button>
        <button class="tab-btn" data-status="expired">만료된 것들</button>
        <button class="tab-btn" data-status="all">전체 (오늘 스케줄)</button>
      </div>
      
      <!-- Unified Search Bar Area with page size selector and locked width badge -->
      <div class="search-bar">
        <div class="input-wrapper">
          <i data-lucide="search"></i>
          <input type="text" id="dest-search-input" class="search-input" placeholder="목적지명 또는 주소 검색 후 엔터..." onkeydown="if(event.key==='Enter') triggerSearch()">
        </div>
        <div class="input-wrapper">
          <i data-lucide="hash"></i>
          <input type="text" id="code-search-input" class="search-input" placeholder="코드(ID) 검색 (4자 이상 자동검색)..." oninput="onCodeInput(this.value)">
        </div>
        <select id="page-size-select" class="select-input" onchange="onPageSizeChange(this.value)">
          <option value="100" selected>100개씩 보기</option>
          <option value="300">300개씩 보기</option>
          <option value="500">500개씩 보기</option>
        </select>
        <button class="btn primary" onclick="triggerSearch()">조회</button>
        <span class="badge info" id="dest-total-count-badge" style="height: 34px; padding: 0 0.85rem; font-size: 0.825rem; white-space: nowrap; line-height: 1; align-items: center; justify-content: center; display: inline-flex;">조회 건수: --개</span>
      </div>

      <!-- ag-Grid container -->
      <div id="myGrid" class="ag-theme-quartz-dark" style="width: 100%;"></div>

      <!-- Server-side pagination controls -->
      <div class="pagination-bar">
        <div class="page-info-text" id="pagination-info-text">
          전체 --개 항목 중 0 - 0 표시 중
        </div>
        <div class="pagination-btn-group">
          <button class="btn secondary sm" id="btn-prev-page" onclick="changePage(-1)" disabled>이전</button>
          
          <span class="badge secondary" id="page-num-badge" style="font-family:monospace; padding:0.4rem 0.6rem; font-size:0.775rem;">Page 1 / 1</span>
          
          <!-- Direct Page Jump Control -->
          <div style="display: flex; align-items: center; gap: 0.3rem;">
            <span style="font-size: 0.775rem; color: var(--text-muted); margin-left: 0.2rem;">이동:</span>
            <input type="number" id="page-jump-input" class="search-input" style="width: 50px; text-align: center; padding: 0.25rem 0.4rem; min-height: 28px; line-height: 1; flex-shrink: 0;" min="1" value="1" onkeydown="if(event.key==='Enter') jumpToPage(this.value)">
            <button class="btn secondary sm" style="padding: 0.25rem 0.5rem; min-height: 28px;" onclick="jumpToPage(document.getElementById('page-jump-input').value)">이동</button>
          </div>
          
          <button class="btn secondary sm" id="btn-next-page" onclick="changePage(1)" disabled>다음</button>
        </div>
      </div>
    </div>

  </main>
  
  <!-- History Modal Overlay -->
  <div id="history-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">작업 히스토리</h3>
        <button id="modal-close-btn" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-meta-info">
          <div><span class="label">목적지명:</span> <span id="modal-dest-name" style="font-weight: 700; color: #ffffff;">-</span></div>
          <div><span class="label">코드 (ID):</span> <span id="modal-dest-id" style="font-weight: 700; color: var(--color-primary); font-family: monospace;">-</span></div>
        </div>
        <div class="table-container">
          <table class="history-table">
            <thead>
              <tr>
                <th style="width: 160px;">시작 시각</th>
                <th style="width: 160px;">종료 시각</th>
                <th style="width: 90px; text-align: right;">소요 시간</th>
                <th style="width: 100px; text-align: center;">상태</th>
                <th>결과 메시지</th>
              </tr>
            </thead>
            <tbody id="modal-history-tbody">
              <!-- Dynamically populated rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
